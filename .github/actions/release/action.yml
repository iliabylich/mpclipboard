inputs:
  filename:
    required: true
  own-release-name:
    required: true
  previous-files-pattern:
    required: true
  token:
    required: true

runs:
  using: composite
  steps:
    - uses: mknejp/delete-release-assets@v1
      with:
        tag: latest
        assets: ${{ inputs.previous-files-pattern }}
        token: ${{ inputs.token }}
        fail-if-no-assets: false
        fail-if-no-release: false

    - name: release (create new for version)
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: false
        artifactErrorsFailBuild: true
        tag: ${{ inputs.own-release-name }}
        artifacts: ${{ inputs.filename }}
        token: ${{ inputs.token }}

    - name: release (append to latest)
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        artifactErrorsFailBuild: true
        tag: latest
        artifacts: ${{ inputs.filename }}
        token: ${{ inputs.token }}

    - name: restore a release called "latest" as in fact latest
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run:
        rid=$(gh api repos/${{ github.repository }}/releases --jq '.[] | select(.name=="latest") | .id')

        gh api --method PATCH repos/${{ github.repository }}/releases/$rid -f make_latest=true
